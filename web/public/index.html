<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Incident Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link id="ui-theme" rel="stylesheet" href="/ui-themes/dracula.css">
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-title">
      <span class="topbar-title-full">AWS Incident Simulator</span>
      <span class="topbar-title-short">AWS Sim</span>
    </span>
    <nav class="topbar-nav" role="tablist" aria-label="Main navigation">
      <button role="tab" aria-selected="true" data-view="dashboard" id="tab-dashboard">Dashboard</button>
      <button role="tab" aria-selected="false" data-view="play" id="tab-play">Play</button>
    </nav>
    <button class="topbar-settings" aria-label="Settings" id="btn-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="main">

    <!-- Dashboard View -->
    <div id="view-dashboard" class="view active">
      <div class="dashboard-stats" id="dashboard-stats">
        <div class="stat-card stat-card-clickable" id="stat-rank-card" role="button" tabindex="0">
          <div class="stat-value stat-value-title" id="stat-rank-title">Pager Duty Intern</div>
          <div class="stat-label">Rank</div>
        </div>
        <div class="stat-card stat-card-clickable" id="stat-completed-card" role="button" tabindex="0">
          <div class="stat-value" id="stat-completed">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <div class="dashboard-drilldown" id="completed-drilldown" style="display: none;">
        <div class="sim-grid" id="completed-grid"></div>
      </div>

      <div class="dashboard-content" id="dashboard-content">
      <div class="dashboard-section" id="section-hexagon">
        <h2>Investigation Profile</h2>
        <p class="hexagon-intro">Better questions lead to faster resolutions. This tracks the types of questions you ask.</p>
        <div class="hexagon-container" id="hexagon-container">
          <div class="hexagon-wrapper">
            <svg id="hexagon-svg" viewBox="-40 -10 380 320" width="420" height="420"></svg>
            <div class="hexagon-hotspots" id="hexagon-hotspots"></div>
          </div>
        </div>
      </div>

      <div class="dashboard-section" id="section-next-rank">
        <h2>Next Rank</h2>
        <div id="next-rank-info"></div>
      </div>

      <div class="dashboard-section" id="section-rank-history">
        <h2>Rank Progression</h2>
        <div class="rank-progression" id="rank-progression"></div>
      </div>

      <div class="dashboard-section" id="section-services">
        <h2>Services Encountered</h2>
        <div class="services-list" id="services-list"></div>
      </div>
      </div>
    </div>

    <!-- Play View -->
    <div id="view-play" class="view">
      <!-- Sim Picker -->
      <div id="sim-picker">
        <div class="sim-grid" id="sim-grid"></div>
        <div class="sim-empty" id="sim-empty" style="display: none;">
          No eligible simulations at your current rank.
        </div>
      </div>

      <!-- Chat (hidden until sim starts) -->
      <div id="chat" class="chat-container">
        <div class="chat-header">
          <button class="chat-back" id="btn-back-to-sims" aria-label="Back to simulations">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <span class="chat-sim-title" id="chat-sim-title"></span>
        </div>
        <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
        </div>
        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dots">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
          </div>
        </div>
        <button class="new-messages-pill" id="new-messages-pill">New messages</button>
        <div class="chat-input-area" id="chat-input-area">
          <textarea
            class="chat-input"
            id="chat-input"
            placeholder="Investigate the incident..."
            rows="1"
            aria-label="Message input"
          ></textarea>
          <button class="btn btn-primary" id="btn-send">Send</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal" role="dialog" aria-label="Settings">
      <div class="modal-title">Settings</div>
      <div class="modal-field">
        <label>Theme</label>
        <div class="custom-select" id="select-ui-theme" data-setting="uiTheme">
          <div class="custom-select-trigger" tabindex="0" role="combobox" aria-expanded="false" aria-label="Theme"></div>
          <div class="custom-select-options" role="listbox"></div>
        </div>
      </div>
      <div class="modal-field">
        <label>Assist Mode</label>
        <div class="custom-select" id="select-assist-mode" data-setting="assistMode">
          <div class="custom-select-trigger" tabindex="0" role="combobox" aria-expanded="false" aria-label="Assist Mode"></div>
          <div class="custom-select-options" role="listbox"></div>
        </div>
      </div>
      <div class="modal-field">
        <label>Model</label>
        <div class="custom-select" id="select-model" data-setting="model">
          <div class="custom-select-trigger" tabindex="0" role="combobox" aria-expanded="false" aria-label="Model"></div>
          <div class="custom-select-options" role="listbox"></div>
        </div>
      </div>
      <div class="modal-field">
        <label>Play Mode</label>
        <div class="custom-select" id="select-playtest" data-setting="playtest">
          <div class="custom-select-trigger" tabindex="0" role="combobox" aria-expanded="false" aria-label="Play Mode"></div>
          <div class="custom-select-options" role="listbox"></div>
        </div>
      </div>
      <button class="btn btn-secondary modal-close" id="btn-close-settings">Close</button>
    </div>
  </div>

  <script src="/markdown.js"></script>
  <script src="/app.js"></script>
</body>
</html>
