name: accessibility
description: >
  ARIA roles, attributes, and focus management. Replaces axe-core
  automated checks with agent-based ARIA inspection. Verifies tab
  navigation reaches all interactive elements, correct roles on chat
  message regions, modal dialog semantics, tablist structure, and
  visible focus outlines.
setup:
  navigate: /
steps:
  - id: tab-navigation-reachable-first
    action: keyboard
    key: "Tab"
    check:
      - selector: ":focus"
        visible: true

  - id: tab-navigation-reachable-second
    action: keyboard
    key: "Tab"
    check:
      - selector: ":focus"
        visible: true

  - id: chat-messages-role-log-nav
    action: click
    target: "#tab-play"
    check:
      - selector: "#view-play"
        visible: true

  - id: chat-messages-role-log
    action: click
    target: ".sim-card:first-child"
    check:
      - selector: "#chat-messages"
        attribute: { role: "log", aria-live: "polite" }

  - id: settings-modal-nav-back
    action: click
    target: "#btn-back-to-sims"
    check:
      - selector: "#view-play"
        visible: true

  - id: settings-modal-role-dialog
    action: click
    target: "#btn-settings"
    check:
      - selector: "#settings-modal .modal"
        attribute: { role: "dialog", aria-label: "Settings" }

  - id: nav-tablist-roles
    action: click
    target: "#btn-close-settings"
    check:
      - selector: ".topbar-nav"
        attribute: { role: "tablist" }
      - selector: "#tab-dashboard"
        attribute: { role: "tab" }
      - selector: "#tab-play"
        attribute: { role: "tab" }

  - id: settings-button-aria-label
    check:
      - selector: "#btn-settings"
        attribute: { aria-label: "Settings" }

  - id: chat-input-aria-label-nav
    action: click
    target: "#tab-play"
    check:
      - selector: "#view-play"
        visible: true

  - id: chat-input-aria-label
    action: click
    target: ".sim-card:first-child"
    check:
      - selector: "#chat-input"
        attribute: { aria-label: "Message input" }

  - id: focus-visible-outline-nav
    action: click
    target: "#btn-back-to-sims"
    check:
      - selector: "#view-play"
        visible: true

  - id: focus-visible-outline
    action: keyboard
    key: "Tab"
    check:
      - selector: ":focus-visible"
        css_property: { outline-style: "solid" }
        visible: true

  - id: console-clean-after-flow
    check:
      - type: console_clean

  - id: network-ok-after-flow
    check:
      - type: network_ok

  - id: landmarks-present
    target:
      landmarks: ["main", "navigation", "complementary"]
    check:
      - type: landmarks_present
