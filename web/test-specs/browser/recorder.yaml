name: recorder
description: Record button with classic record/stop icons and correct initial state.
setup:
  navigate: /
steps:
  - id: record-button-present
    check:
      - selector: "#btn-record"
        visible: true

  - id: record-button-aria
    check:
      - selector: "#btn-record"
        attribute: { aria-label: "Record" }

  - id: record-button-not-recording
    check:
      - selector: "#btn-record.recording"
        visible: false

  - id: record-icon-visible
    check:
      - selector: "#btn-record .icon-record"
        visible: true

  - id: stop-icon-hidden
    check:
      - selector: "#btn-record .icon-stop"
        style: { display: "none" }

  - id: record-icon-is-circle
    description: The record icon should be an SVG with a circle element (classic record symbol).
    check:
      - selector: "#btn-record .icon-record circle"
        attribute: { fill: "#F87171" }

  - id: stop-icon-is-square
    description: The stop icon should be an SVG with a rect element (classic stop symbol).
    check:
      - selector: "#btn-record .icon-stop rect"
        attribute: { fill: "#F87171" }
