name: sim-picker
description: >
  Simulation picker grid on the play tab. Covers card rendering with
  details, keyboard navigation and activation, empty state when no
  sims are available, and difficulty dot indicators.
setup:
  navigate: /
steps:
  - id: sim-grid-renders-cards
    action: click
    target: "#tab-play"
    check:
      - selector: ".sim-grid .sim-card"
        visible: true
        min_count: 1

  - id: card-shows-details
    check:
      - selector: ".sim-card .sim-card-title"
        visible: true
      - selector: ".sim-card .sim-card-category"
        visible: true
      - selector: ".sim-card .difficulty-dots"
        visible: true

  - id: cards-keyboard-focusable
    action: keyboard
    key: "Tab"
    check:
      - selector: ".sim-card:focus"
        visible: true

  - id: card-click-starts-chat
    action: click
    target: ".sim-card:first-child"
    check:
      - selector: "#chat"
        visible: true

  - id: enter-key-nav-back
    action: click
    target: "#btn-back-to-sims"
    check:
      - selector: "#view-play"
        visible: true

  - id: enter-key-focus-card
    action: keyboard
    key: "Tab"
    check:
      - selector: ".sim-card:focus"
        visible: true

  - id: enter-key-starts-sim
    action: keyboard
    key: "Enter"
    check:
      - selector: "#chat"
        visible: true

  - id: space-key-nav-back
    action: click
    target: "#btn-back-to-sims"
    check:
      - selector: "#view-play"
        visible: true

  - id: space-key-focus-card
    action: keyboard
    key: "Tab"
    check:
      - selector: ".sim-card:focus"
        visible: true

  - id: space-key-starts-sim
    action: keyboard
    key: " "
    check:
      - selector: "#chat"
        visible: true

  - id: empty-state-no-sims
    check:
      - selector: "#sim-empty"
        visible: true
        text_contains: "No eligible simulations at your current rank."

  - id: difficulty-dots-render
    check:
      - selector: ".sim-card .difficulty-dots .difficulty-dot:not(.empty)"
        visible: true
        min_count: 1

  - id: console-clean-after-flow
    check:
      - type: console_clean

  - id: network-ok-after-flow
    check:
      - type: network_ok
