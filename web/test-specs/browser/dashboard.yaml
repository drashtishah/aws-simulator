name: dashboard
description: >
  Dashboard view showing player rank, hexagon progress visualization,
  and AWS services section populated from the API. Verifies that
  deprecated elements have been removed.
setup:
  navigate: /
steps:
  - id: rank-title-shown
    check:
      - selector: "#view-dashboard #stat-rank-title"
        visible: true
        text_contains: " "

  - id: hexagon-svg-visible
    check:
      - selector: "#view-dashboard #hexagon-svg"
        visible: true

  - id: hexagon-has-labels
    check:
      - selector: "#hexagon-svg text"
        visible: true
        min_count: 6

  - id: services-section-visible
    check:
      - selector: "#section-services"
        visible: true
      - selector: "#section-services h2"
        text_contains: "Services"

  - id: services-from-api
    check:
      - selector: "#services-list .service-encountered-tag"
        visible: true
        min_count: 1

  - id: no-removed-elements
    check:
      - selector: "#legacy-progress-bar"
        visible: false
      - selector: "#old-level-display"
        visible: false
