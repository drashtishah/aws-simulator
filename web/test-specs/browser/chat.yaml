name: chat
description: >
  Chat interface during an active simulation session. Covers SSE message
  rendering for narrator and console roles, player message sending,
  empty message prevention, keyboard shortcuts, textarea auto-resize,
  back and quit navigation, and session-complete UI state. Requires mock
  game routes that return canned SSE streams for narrator and console
  messages.
setup:
  navigate: /
steps:
  - id: chat-container-on-sim-start-nav
    action: click
    target: "#tab-play"
    check:
      - selector: "#view-play"
        visible: true

  - id: chat-container-on-sim-start
    action: click
    target: ".sim-card:first-child"
    check:
      - selector: "#chat"
        visible: true
      - selector: "#chat-messages"
        visible: true
      - selector: "#chat-input"
        visible: true

  - id: sim-title-shown
    check:
      - selector: "#chat-sim-title"
        visible: true
        text_contains: "sim"

  - id: narrator-message-visible
    check:
      - selector: ".chat-message.narrator"
        visible: true
        min_count: 1

  - id: console-message-visible
    check:
      - selector: ".chat-message.console"
        visible: true
        min_count: 1

  - id: player-message-sent-type
    action: type
    target: "#chat-input"
    text: "describe the error logs"

  - id: player-message-sent
    action: click
    target: "#btn-send"
    check:
      - selector: ".chat-message.player"
        visible: true
        text_contains: "describe the error logs"

  - id: empty-message-blocked
    action: click
    target: "#btn-send"
    check:
      - selector: "#btn-send"
        attribute: { disabled: "true" }

  - id: enter-sends-type
    action: type
    target: "#chat-input"
    text: "check cloudwatch"

  - id: enter-sends-shift-enter-does-not
    action: keyboard
    key: "Enter"
    check:
      - selector: ".chat-message.player:last-child"
        text_contains: "check cloudwatch"

  - id: textarea-auto-resizes
    action: type
    target: "#chat-input"
    text: "line one\nline two\nline three\nline four"
    check:
      - selector: "#chat-input"
        css_property: { height: "auto" }
        visible: true

  - id: back-button-returns
    action: click
    target: "#btn-back-to-sims"
    check:
      - selector: "#view-play"
        visible: true
      - selector: "#chat"
        visible: false

  - id: quit-button-start-sim
    action: click
    target: ".sim-card:first-child"
    check:
      - selector: "#chat"
        visible: true

  - id: quit-button-confirms
    action: click
    target: "#btn-back-to-sims"
    check:
      - selector: "#confirm-modal.active"
        visible: true
      - selector: "#confirm-modal-title"
        text_contains: "Leave"

  - id: session-complete-ui
    check:
      - selector: "#chat-input"
        attribute: { disabled: "true" }
      - selector: "#btn-send"
        attribute: { disabled: "true" }
