name: settings
description: >
  Settings modal with custom dropdown components for theme selection.
  Verifies dropdowns are not native select elements, theme switching
  updates the stylesheet, and keyboard navigation works within dropdown
  menus.
setup:
  navigate: /
steps:
  - id: custom-dropdowns-not-native
    action: click
    target: "#btn-settings"
    check:
      - selector: "#settings-modal select"
        visible: false
      - selector: "#settings-modal .custom-select"
        visible: true
        min_count: 1

  - id: theme-dropdown-populated
    action: click
    target: "#select-ui-theme .custom-select-trigger"
    check:
      - selector: "#select-ui-theme .custom-select-option"
        visible: true
        min_count: 2

  - id: dropdown-open-select-open
    action: click
    target: "#select-ui-theme .custom-select-trigger"
    check:
      - selector: "#select-ui-theme.open"
        visible: true

  - id: dropdown-open-select
    action: click
    target: "#select-ui-theme .custom-select-option:nth-child(2)"
    check:
      - selector: "#select-ui-theme .custom-select-trigger"
        text_contains: " "
      - selector: "#select-ui-theme.open"
        visible: false

  - id: theme-changes-stylesheet-open
    action: click
    target: "#select-ui-theme .custom-select-trigger"
    check:
      - selector: "#select-ui-theme.open"
        visible: true

  - id: theme-changes-stylesheet
    action: click
    target: "#select-ui-theme .custom-select-option[data-value='light']"
    check:
      - selector: "#ui-theme"
        attribute: { href: "light" }

  - id: default-theme-dracula
    check:
      - selector: "#select-ui-theme .custom-select-trigger"
        text_contains: "Ops Center"

  - id: keyboard-navigation-dropdown-open
    action: click
    target: "#select-ui-theme .custom-select-trigger"
    check:
      - selector: "#select-ui-theme.open"
        visible: true

  - id: keyboard-navigation-dropdown-nav
    action: keyboard
    key: "ArrowDown"

  - id: keyboard-navigation-dropdown-nav2
    action: keyboard
    key: "ArrowDown"

  - id: keyboard-navigation-dropdown
    action: keyboard
    key: "Enter"
    check:
      - selector: "#select-ui-theme.open"
        visible: false
      - selector: "#select-ui-theme .custom-select-trigger"
        text_contains: " "

  - id: console-clean-after-flow
    check:
      - type: console_clean

  - id: network-ok-after-flow
    check:
      - type: network_ok
