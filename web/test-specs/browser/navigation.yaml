name: navigation
description: >
  Tab switching between dashboard and play views, ARIA state management
  on tab elements, settings modal open and close behavior, and topbar
  content rendering.
setup:
  navigate: /
steps:
  - id: dashboard-active-on-load
    check:
      - selector: "#tab-dashboard"
        attribute: { aria-selected: "true" }
        visible: true

  - id: dashboard-aria-selected
    check:
      - selector: "#tab-dashboard"
        attribute: { aria-selected: "true" }
      - selector: "#tab-play"
        attribute: { aria-selected: "false" }

  - id: play-tab-switch
    action: click
    target: "#tab-play"
    check:
      - selector: "#tab-play"
        attribute: { aria-selected: "true" }
      - selector: "#tab-dashboard"
        attribute: { aria-selected: "false" }
      - selector: "#view-play"
        visible: true

  - id: dashboard-tab-back
    action: click
    target: "#tab-dashboard"
    check:
      - selector: "#tab-dashboard"
        attribute: { aria-selected: "true" }
      - selector: "#view-dashboard"
        visible: true

  - id: settings-modal-open
    action: click
    target: "#btn-settings"
    check:
      - selector: "#settings-modal"
        visible: true
        has_class: active

  - id: settings-modal-close-outside
    action: click
    target: "#settings-modal"
    check:
      - selector: "#settings-modal"
        not_has_class: active
        visible: false

  - id: settings-modal-close-button
    action: click
    target: "#btn-settings"
    check:
      - selector: "#settings-modal"
        visible: true

  - id: settings-modal-close-button-confirm
    action: click
    target: "#btn-close-settings"
    check:
      - selector: "#settings-modal"
        visible: false

  - id: topbar-content
    check:
      - selector: ".topbar .topbar-title-full"
        text_contains: "AWS Incident Simulator"
        visible: true
      - selector: ".topbar #btn-settings"
        visible: true

  - id: console-clean-after-flow
    check:
      - type: console_clean

  - id: network-ok-after-flow
    check:
      - type: network_ok
