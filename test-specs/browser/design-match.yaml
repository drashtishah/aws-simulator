name: design-match
description: >
  Visual regression checks comparing live browser screenshots against
  Stitch design reference images. Each step captures a screenshot of a
  specific view or component and compares it to the corresponding
  design file in design/stitch-screens/.
setup:
  navigate: /
steps:
  - id: dashboard-desktop-screenshot
    check:
      - selector: "#dashboard-view"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/dashboard.png

  - id: dashboard-mobile-screenshot
    action: emulate
    viewport: "375x667"
    check:
      - selector: "#dashboard-view"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/dashboard-mobile.png

  - id: sim-picker-desktop-emulate
    action: emulate
    viewport: "1280x800"
    check:
      - selector: "#dashboard-view"
        visible: true

  - id: sim-picker-desktop
    action: click
    target: "[data-tab='play']"
    check:
      - selector: "#play-view"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/sim-picker.png

  - id: sim-picker-mobile
    action: emulate
    viewport: "375x667"
    check:
      - selector: "#play-view"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/sim-picker-mobile.png

  - id: settings-modal-emulate
    action: emulate
    viewport: "1280x800"
    check:
      - selector: "#play-view"
        visible: true

  - id: settings-modal-screenshot
    action: click
    target: "#settings-button"
    check:
      - selector: "#settings-modal"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/settings-modal.png

  - id: chat-messages-close-settings
    action: click
    target: "#settings-close"
    check:
      - selector: "#settings-modal"
        visible: false

  - id: chat-messages-nav-play
    action: click
    target: "[data-tab='play']"
    check:
      - selector: "#play-view"
        visible: true

  - id: chat-messages-screenshot
    action: click
    target: ".sim-card:first-child"
    check:
      - selector: "#chat-messages"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/chat-messages.png

  - id: topbar-desktop-nav-back
    action: click
    target: "#chat-back-button"
    check:
      - selector: "#play-view"
        visible: true

  - id: topbar-desktop
    action: emulate
    viewport: "1280x800"
    check:
      - selector: "#topbar"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/topbar.png

  - id: topbar-mobile
    action: emulate
    viewport: "375x667"
    check:
      - selector: "#topbar"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/topbar-mobile.png

  - id: sim-card-closeup-emulate
    action: emulate
    viewport: "1280x800"
    check:
      - selector: "#topbar"
        visible: true

  - id: sim-card-closeup
    action: click
    target: "[data-tab='play']"
    check:
      - selector: ".sim-card:first-child"
        visible: true
        screenshot_compare:
          compare_to: design/stitch-screens/sim-card.png
