name: critic
run-name: "critic #${{ github.event.issue.number }}"
on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  critique:
    if: |
      github.event.label.name == 'needs-critique' &&
      github.event.sender.login == github.repository_owner &&
      (github.event.issue.user.login == github.repository_owner || github.event.issue.user.login == 'claude[bot]') &&
      !contains(github.event.issue.labels.*.name, 'blocked') &&
      !contains(github.event.issue.labels.*.name, 'cancel') &&
      !contains(github.event.issue.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(", ")')
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Critic starting. Labels: $labels"

      - name: Classify issue and load prompt
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for attempt in 1 2 3 4 5; do
            labels_check=$(gh issue view "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --json labels --jq '[.labels[].name] | join(",")')
            if echo "$labels_check" | grep -qE "text-only|ui|sim-content"; then
              break
            fi
            sleep 3
          done

          N=${{ github.event.issue.number }}
          labels=$(gh issue view "$N" --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(",")')

          BASE="references/pipeline/critic.md"
          OVERLAY=""
          TOOLS="Read,Glob,Grep,Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue edit:*)"
          MCP_ARG=""

          if echo "$labels" | grep -q "text-only"; then
            OVERLAY="references/pipeline/context-text.md"
          elif echo "$labels" | grep -q "ui"; then
            OVERLAY="references/pipeline/context-ui.md"
          elif echo "$labels" | grep -q "sim-content"; then
            OVERLAY="references/pipeline/context-sim.md"
            TOOLS="$TOOLS,mcp__aws-knowledge-mcp-server"
            MCP_ARG="--mcp-config .mcp.ci.json"
          fi

          {
            echo 'prompt<<PROMPT_EOF'
            sed "s/{{ISSUE}}/$N/g" "$BASE"
            if [ -n "$OVERLAY" ]; then
              echo ""
              sed "s/{{ISSUE}}/$N/g" "$OVERLAY"
            fi
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "mcp_arg=$MCP_ARG" >> "$GITHUB_OUTPUT"
          echo "model=$(jq -r .critic.model scripts/model-config.json)" >> "$GITHUB_OUTPUT"
          echo "effort=$(jq -r .critic.effort scripts/model-config.json)" >> "$GITHUB_OUTPUT"

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ steps.setup.outputs.model }}
            --effort ${{ steps.setup.outputs.effort }}
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVED","REVISE","DECOMPOSE"]},"summary":{"type":"string"}},"required":["verdict","summary"]}'
            ${{ steps.setup.outputs.mcp_arg }}
            --allowed-tools "${{ steps.setup.outputs.tools }}"
          prompt: ${{ steps.setup.outputs.prompt }}

      - name: Swap labels based on critique
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          verdict=$(echo "$STRUCTURED_OUTPUT" | jq -r '.verdict')
          source .github/scripts/pipeline-iterations.sh
          plan_count=$(count_plans ${{ github.event.issue.number }} ${{ github.repository }})
          impl_count=$(count_impls ${{ github.event.issue.number }} ${{ github.repository }})
          if [ "$verdict" = "APPROVED" ]; then
            REMOVE="--remove-label needs-critique"
            current=$(gh issue view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json labels --jq '[.labels[].name] | join(",")')
            if echo "$current" | grep -q "revised-plan"; then
              REMOVE="$REMOVE --remove-label revised-plan"
            fi
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              $REMOVE --add-label "needs-impl"
          elif [ "$verdict" = "DECOMPOSE" ]; then
            if [ "$plan_count" -ge "$MAX_ITERATIONS" ]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "needs-critique" \
                --add-label "needs-human"
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body "Decomposition requested but plan revised $plan_count times (max $MAX_ITERATIONS). plans=$plan_count, implementations=$impl_count. Escalating."
            else
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "needs-critique" \
                --add-label "needs-plan" \
                --add-label "revised-plan" \
                --add-label "needs-decomposition"
            fi
          else
            if [ "$plan_count" -ge "$MAX_ITERATIONS" ]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "needs-critique" \
                --add-label "needs-human"
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body "Plan revised $plan_count times without approval (max $MAX_ITERATIONS). plans=$plan_count, implementations=$impl_count. Escalating to human."
            else
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "needs-critique" \
                --add-label "needs-plan" \
                --add-label "revised-plan"
            fi
          fi

      - name: Handle stage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "pipeline-failed"
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "needs-critique" || true
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "critic stage failed. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
