# .github/workflows/ci.yml
#
# Deterministic test gate. Runs on every pull_request and on every push to
# master. Mirrors the local pre-PR gate so the human is no longer the only
# verifier and so master is auditable per commit. Issue #137.
#
# Includes a hard health-regression gate (Issue #143): computes health
# scores on the PR head and on the merge base, then fails if any bucket
# regressed. This is critical for autonomous merging by the verifier.

name: ci

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install python deps
        run: pip install mypy

      - name: install node deps
        run: npm ci

      - name: npm test
        run: npm test

      - name: npm run health
        run: npm run health

      - name: health regression check (Issue #143)
        if: github.event_name == 'pull_request'
        run: |
          # Capture health scores on the PR head
          npx tsx scripts/code-health.ts --json > /tmp/pr-health.jsonl

          # Compute health scores on the merge base
          BASE_SHA=$(git merge-base HEAD origin/${{ github.base_ref }})
          git stash --include-untracked
          git checkout "$BASE_SHA" --quiet
          npm ci --silent
          npx tsx scripts/code-health.ts --json > /tmp/base-health.jsonl
          git checkout - --quiet
          git stash pop --quiet || true

          # Compare: fail if any bucket regressed
          npx tsx scripts/health-regression-check.ts /tmp/pr-health.jsonl /tmp/base-health.jsonl

      - name: seed per-user state for doctor
        run: |
          # learning/system-vault/ is gitignored (per-user state). The doctor
          # check refuses to advisory-downgrade missing index.md (per a prior
          # explicit decision in the project history), so CI seeds the stub
          # before invoking doctor. This mirrors the per-worktree initializer
          # tracked by Issue #138.
          mkdir -p learning/system-vault
          test -f learning/system-vault/index.md || \
            echo '# System Vault (CI stub)' > learning/system-vault/index.md

      - name: npm run doctor (skip integration on CI)
        env:
          DOCTOR_SKIP_INTEGRATION: '1'
        run: npm run doctor
