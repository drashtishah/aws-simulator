name: planner
run-name: "planner #${{ github.event.issue.number }}"
on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  plan:
    if: |
      github.event.label.name == 'needs-plan' &&
      github.event.sender.login == github.repository_owner &&
      (github.event.issue.user.login == github.repository_owner || github.event.issue.user.login == 'claude[bot]') &&
      !contains(github.event.issue.labels.*.name, 'blocked') &&
      !contains(github.event.issue.labels.*.name, 'cancel') &&
      !contains(github.event.issue.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache graphify
        id: graphify-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/pipx/venvs/graphifyy
            ~/.local/bin/graphify
          key: graphify-0.4.15

      - name: Install graphify
        if: steps.graphify-cache.outputs.cache-hit != 'true'
        run: pipx install graphifyy==0.4.15

      - name: Add graphify to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(", ")')
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Planner starting. Labels: $labels"

      - name: Classify issue and load prompt
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Retry until a type label (text-only, ui, sim-content) appears.
          for attempt in 1 2 3 4 5; do
            labels_check=$(gh issue view "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --json labels --jq '[.labels[].name] | join(",")')
            if echo "$labels_check" | grep -qE "text-only|ui|sim-content"; then
              break
            fi
            sleep 3
          done

          N=${{ github.event.issue.number }}
          labels=$(gh issue view "$N" --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(",")')

          BASE="references/pipeline/planner.md"
          OVERLAY=""
          TOOLS="Read,Glob,Grep,WebFetch,Bash(graphify:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh issue edit:*)"
          # Allow issue creation only for non-child issues (anti-recursion)
          if ! echo "$labels" | grep -q "decomposed-from"; then
            TOOLS="$TOOLS,Bash(gh issue create:*)"
          fi
          MCP_ARG=""

          if echo "$labels" | grep -q "text-only"; then
            OVERLAY="references/pipeline/context-text.md"
          elif echo "$labels" | grep -q "ui"; then
            OVERLAY="references/pipeline/context-ui.md"
          elif echo "$labels" | grep -q "sim-content"; then
            OVERLAY="references/pipeline/context-sim.md"
            TOOLS="$TOOLS,mcp__aws-knowledge-mcp-server"
            MCP_ARG="--mcp-config .mcp.ci.json"
          fi

          {
            echo 'prompt<<PROMPT_EOF'
            sed "s/{{ISSUE}}/$N/g" "$BASE"
            if [ -n "$OVERLAY" ]; then
              echo ""
              sed "s/{{ISSUE}}/$N/g" "$OVERLAY"
            fi
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "mcp_arg=$MCP_ARG" >> "$GITHUB_OUTPUT"
          echo "model=$(jq -r .planner.model scripts/model-config.json)" >> "$GITHUB_OUTPUT"
          echo "effort=$(jq -r .planner.effort scripts/model-config.json)" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ steps.setup.outputs.model }}
            --effort ${{ steps.setup.outputs.effort }}
            ${{ steps.setup.outputs.mcp_arg }}
            --allowed-tools "${{ steps.setup.outputs.tools }}"
          prompt: ${{ steps.setup.outputs.prompt }}

      - name: Auto-apply type label
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          N=${{ github.event.issue.number }}
          REPO=${{ github.repository }}
          labels=$(gh issue view "$N" --repo "$REPO" \
            --json labels --jq '[.labels[].name] | join(",")')
          if echo "$labels" | grep -qE "text-only|ui|sim-content"; then
            echo "Type label already present, skipping."
            exit 0
          fi
          body=$(gh issue view "$N" --repo "$REPO" --json body --jq '.body')
          change_section=$(echo "$body" \
            | awk '/^#{1,4} *[Ff]iles to change/{f=1; next} /^#{1,4} /{f=0} f')
          if echo "$change_section" | grep -qE 'web/'; then
            echo "Detected web/ paths in Files to change, adding ui label."
            gh issue edit "$N" --repo "$REPO" --add-label "ui"
          elif echo "$change_section" | grep -qE 'sims/'; then
            echo "Detected sims/ paths in Files to change, adding sim-content label."
            gh issue edit "$N" --repo "$REPO" --add-label "sim-content"
          fi

      - name: Swap labels
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          N=${{ github.event.issue.number }}
          REPO=${{ github.repository }}
          current=$(gh issue view "$N" --repo "$REPO" \
            --json labels --jq '[.labels[].name] | join(",")')
          REMOVE="--remove-label needs-plan"
          for lbl in revised-plan needs-decomposition; do
            if echo "$current" | grep -q "$lbl"; then
              REMOVE="$REMOVE --remove-label $lbl"
            fi
          done
          gh issue edit "$N" --repo "$REPO" $REMOVE --add-label "needs-critique"

      - name: Handle stage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "pipeline-failed"
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "needs-plan" || true
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "planner stage failed. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
