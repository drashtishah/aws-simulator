name: verifier
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  verify:
    if: |
      github.event.label.name == 'needs-verify' &&
      github.event.sender.login == github.repository_owner &&
      github.event.issue.user.login == github.repository_owner &&
      !contains(github.event.issue.labels.*.name, 'blocked') &&
      !contains(github.event.issue.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.email "6rashti5hah@gmail.com"
          git config user.name  "Drashti Shah"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowed-tools "Read,Glob,Grep,Edit,Bash(git:*),Bash(npm:*),Bash(tsx:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr merge:*)"
          prompt: |
            You are running inside GitHub Actions on issue #${{ github.event.issue.number }}.
            The repository is checked out at the workspace root.

            Rules:
              - No emojis
              - No `--` as punctuation
              - All file paths must be root-relative
              - Backticks only for file paths and code

            Behavioral guidelines (non-negotiable):
              - Simplicity first. No features beyond what was asked.
              - Surgical changes. Every changed line traces to the issue.
              - Do not refactor or expand scope. Only fix trivial issues (missing
                import, lint error, missed edge case).

            Your role: VERIFIER

            Read:
            1. The original issue body.
            2. The planner's plan comment.
            3. The critic's comment.
            4. The implementer's branch (find it from the implementer's comment).

            Check out the implementer's branch:
              git fetch origin
              git checkout feature/issue-${{ github.event.issue.number }}-<slug>

            Verification checklist (complete ALL):

            1. Diff vs plan: `git diff master..HEAD`. Does every changed file
               appear in the plan? Unlisted files = scope creep = FAIL.
            2. TDD honesty: `git log --oneline master..HEAD`. Is there a
               failing-test commit before the implementation commit? If not, FAIL.
               Skip this check if the plan's Scope is "Text/docs only."
            3. Commit hygiene: each commit references `#${{ github.event.issue.number }}`?
               Last commit has `Closes #${{ github.event.issue.number }}`?
            4. Tests pass: `npm test`, `npm run health`, `DOCTOR_SKIP_INTEGRATION=1 npm run doctor`.
               All three must exit 0.
            5. Karpathy check: any speculative abstractions, unrelated cleanups,
               or "improvements" to adjacent code? FAIL on first violation.

            You MAY make small fixes (missing import, lint error). Commit as
            `fix: <thing>` with `Ref #${{ github.event.issue.number }}`.

            DECISION:
            - All checks pass:
              1. `gh pr create --base master --head <branch> --title "<issue title>" --body "Closes #${{ github.event.issue.number }}"`
              2. `gh pr merge <PR#> --merge --auto --delete-branch`
              3. Comment: `Verification: PASS. PR #<PR#> opened and queued for auto-merge.`
            - Any check fails, no `retry-2` label:
              Comment ending with `Verification: FAIL, retry.`
            - Any check fails, `retry-2` already present:
              Comment ending with `Verification: FAIL, escalate.`

      - name: Swap labels based on verification
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          last_comment=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json comments --jq '.comments[-1].body')
          if echo "$last_comment" | grep -q "Verification: PASS."; then
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify"
          elif echo "$last_comment" | grep -q "Verification: FAIL, retry."; then
            labels=$(gh issue view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json labels --jq '.labels[].name')
            if echo "$labels" | grep -q '^retry-1$'; then
              next_retry="retry-2"
              rm_retry="--remove-label retry-1"
            else
              next_retry="retry-1"
              rm_retry=""
            fi
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify" \
              $rm_retry \
              --add-label "needs-impl" \
              --add-label "$next_retry"
          else
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify" \
              --add-label "needs-human"
          fi
