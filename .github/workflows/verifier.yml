name: verifier
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  verify:
    if: |
      github.event.label.name == 'needs-verify' &&
      github.event.sender.login == github.repository_owner &&
      github.event.issue.user.login == github.repository_owner &&
      !contains(github.event.issue.labels.*.name, 'blocked') &&
      !contains(github.event.issue.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(", ")')
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Verifier starting. Labels: $labels"

      - name: Configure git author
        run: |
          git config user.email "6rashti5hah@gmail.com"
          git config user.name  "Drashti Shah"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Classify issue and load prompt
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for attempt in 1 2 3 4 5; do
            labels_check=$(gh issue view "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --json labels --jq '[.labels[].name] | join(",")')
            if echo "$labels_check" | grep -qE "text-only|ui|sim-content"; then
              break
            fi
            sleep 3
          done

          N=${{ github.event.issue.number }}
          labels=$(gh issue view "$N" --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(",")')

          BASE="references/pipeline/verifier.md"
          OVERLAY=""
          TOOLS="Read,Glob,Grep,Edit,Bash(git:*),Bash(npm:*),Bash(tsx:*),Bash(gh issue view:*),Bash(gh issue comment:*)"
          MCP_ARG=""

          if echo "$labels" | grep -q "text-only"; then
            OVERLAY="references/pipeline/context-text.md"
          elif echo "$labels" | grep -q "ui"; then
            OVERLAY="references/pipeline/context-ui.md"
            TOOLS="$TOOLS,mcp__chrome-devtools"
            MCP_ARG="--mcp-config .mcp.ci.json"
          elif echo "$labels" | grep -q "sim-content"; then
            OVERLAY="references/pipeline/context-sim.md"
          fi

          {
            echo 'prompt<<PROMPT_EOF'
            sed "s/{{ISSUE}}/$N/g" "$BASE"
            if [ -n "$OVERLAY" ]; then
              echo ""
              sed "s/{{ISSUE}}/$N/g" "$OVERLAY"
            fi
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "mcp_arg=$MCP_ARG" >> "$GITHUB_OUTPUT"

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          additional_permissions: "actions: read"
          claude_args: |
            --model claude-sonnet-4-6
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["PASS","FAIL_RETRY","FAIL_ESCALATE"]},"summary":{"type":"string"}},"required":["verdict","summary"]}'
            ${{ steps.setup.outputs.mcp_arg }}
            --allowed-tools "${{ steps.setup.outputs.tools }}"
          prompt: ${{ steps.setup.outputs.prompt }}

      - name: Swap labels based on verification
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          verdict=$(echo "$STRUCTURED_OUTPUT" | jq -r '.verdict')
          source .github/scripts/pipeline-iterations.sh
          plan_count=$(count_plans ${{ github.event.issue.number }} ${{ github.repository }})
          impl_count=$(count_impls ${{ github.event.issue.number }} ${{ github.repository }})
          if [ "$verdict" = "PASS" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "Verifier PASS. plans=$plan_count, implementations=$impl_count. Handing off to reflector for merge and PR."
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify" \
              --remove-label "revised-impl" \
              --add-label "needs-reflection"
          elif [ "$verdict" = "FAIL_RETRY" ]; then
            if [ "$impl_count" -ge "$MAX_ITERATIONS" ]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "needs-verify" \
                --add-label "needs-human"
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body "Implementation revised $impl_count times without passing (max $MAX_ITERATIONS). plans=$plan_count, implementations=$impl_count. Escalating to human."
            else
              summary=$(echo "$STRUCTURED_OUTPUT" | jq -r '.summary')
              printf 'Verifier FAIL_RETRY. plans=%s, implementations=%s. Continue on branch feature/issue-%s (do not create a new branch). Address: %s' \
                "$plan_count" "$impl_count" "${{ github.event.issue.number }}" "$summary" | \
              gh issue comment ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --body-file -
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "needs-verify" \
                --add-label "needs-impl" \
                --add-label "revised-impl"
            fi
          else
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify" \
              --add-label "needs-human"
          fi

      - name: Handle stage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "needs-verify" \
            --add-label "pipeline-failed"
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "verifier stage failed. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
