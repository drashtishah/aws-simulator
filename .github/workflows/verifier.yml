name: verifier
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  verify:
    if: |
      github.event.label.name == 'needs-verify' &&
      github.event.sender.login == github.repository_owner &&
      github.event.issue.user.login == github.repository_owner &&
      !contains(github.event.issue.labels.*.name, 'blocked') &&
      !contains(github.event.issue.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(", ")')
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Verifier starting. Labels: $labels"

      - name: Configure git author
        run: |
          git config user.email "6rashti5hah@gmail.com"
          git config user.name  "Drashti Shah"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Classify issue and load prompt
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for attempt in 1 2 3 4 5; do
            labels_check=$(gh issue view "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --json labels --jq '[.labels[].name] | join(",")')
            if echo "$labels_check" | grep -qE "text-only|ui|sim-content"; then
              break
            fi
            sleep 3
          done

          N=${{ github.event.issue.number }}
          labels=$(gh issue view "$N" --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(",")')

          BASE="references/pipeline/verifier.md"
          OVERLAY=""
          TOOLS="Read,Glob,Grep,Edit,Bash(git:*),Bash(npm:*),Bash(tsx:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr merge:*)"
          MCP_ARG=""

          if echo "$labels" | grep -q "text-only"; then
            OVERLAY="references/pipeline/context-text.md"
          elif echo "$labels" | grep -q "ui"; then
            OVERLAY="references/pipeline/context-ui.md"
            TOOLS="$TOOLS,mcp__chrome-devtools"
            MCP_ARG="--mcp-config .mcp.ci.json"
          elif echo "$labels" | grep -q "sim-content"; then
            OVERLAY="references/pipeline/context-sim.md"
          fi

          {
            echo 'prompt<<PROMPT_EOF'
            sed "s/{{ISSUE}}/$N/g" "$BASE"
            if [ -n "$OVERLAY" ]; then
              echo ""
              sed "s/{{ISSUE}}/$N/g" "$OVERLAY"
            fi
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "mcp_arg=$MCP_ARG" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          claude_args: |
            --model claude-sonnet-4-6
            ${{ steps.setup.outputs.mcp_arg }}
            --allowed-tools "${{ steps.setup.outputs.tools }}"
          prompt: ${{ steps.setup.outputs.prompt }}

      - name: Swap labels based on verification
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          last_comment=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json comments --jq '.comments[-1].body')
          if echo "$last_comment" | grep -q "Verification: PASS."; then
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify"
          elif echo "$last_comment" | grep -q "Verification: FAIL, retry."; then
            labels=$(gh issue view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json labels --jq '.labels[].name')
            if echo "$labels" | grep -q '^retry-1$'; then
              next_retry="retry-2"
              rm_retry="--remove-label retry-1"
            else
              next_retry="retry-1"
              rm_retry=""
            fi
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify" \
              $rm_retry \
              --add-label "needs-impl" \
              --add-label "$next_retry"
          else
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-verify" \
              --add-label "needs-human"
          fi
