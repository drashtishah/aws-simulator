name: implementer
run-name: "implementer #${{ github.event.issue.number }}"
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  implement:
    if: |
      github.event.label.name == 'needs-impl' &&
      github.event.sender.login == github.repository_owner &&
      (github.event.issue.user.login == github.repository_owner || github.event.issue.user.login == 'claude[bot]') &&
      !contains(github.event.issue.labels.*.name, 'blocked') &&
      !contains(github.event.issue.labels.*.name, 'cancel') &&
      !contains(github.event.issue.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Post starting comment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(", ")')
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Implementer starting. Labels: $labels"

      - name: Configure git author
        run: |
          git config user.email "6rashti5hah@gmail.com"
          git config user.name  "Drashti Shah"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Cache RTK
        id: rtk-cache
        uses: actions/cache@v4
        with:
          path: ~/.rtk
          key: rtk-8a7106c8f2996ebc75b38a71c5f342f17811ce39

      - name: Install RTK (git token compression)
        if: steps.rtk-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/8a7106c8f2996ebc75b38a71c5f342f17811ce39/install.sh | sh || true

      - name: Add RTK to PATH
        run: echo "$HOME/.rtk/bin" >> "$GITHUB_PATH"

      - name: Classify issue and load prompt
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for attempt in 1 2 3 4 5; do
            labels_check=$(gh issue view "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --json labels --jq '[.labels[].name] | join(",")')
            if echo "$labels_check" | grep -qE "text-only|ui|sim-content"; then
              break
            fi
            sleep 3
          done

          N=${{ github.event.issue.number }}
          labels=$(gh issue view "$N" --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(",")')

          BASE="references/pipeline/implementer.md"
          OVERLAY=""
          TOOLS="Read,Glob,Grep,Edit,Write,Bash(git:*),Bash(rtk:*),Bash(which:*),Bash(npm:*),Bash(npx:*),Bash(tsx:*),Bash(python3:*),Bash(gh issue view:*),Bash(gh issue comment:*)"
          MCP_ARG=""

          if echo "$labels" | grep -q "text-only"; then
            OVERLAY="references/pipeline/context-text.md"
          elif echo "$labels" | grep -q "ui"; then
            OVERLAY="references/pipeline/context-ui.md"
            TOOLS="$TOOLS,mcp__chrome-devtools"
            MCP_ARG="--mcp-config .mcp.ci.json"
          elif echo "$labels" | grep -q "sim-content"; then
            OVERLAY="references/pipeline/context-sim.md"
          fi

          {
            echo 'prompt<<PROMPT_EOF'
            sed "s/{{ISSUE}}/$N/g" "$BASE"
            if [ -n "$OVERLAY" ]; then
              echo ""
              sed "s/{{ISSUE}}/$N/g" "$OVERLAY"
            fi
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "mcp_arg=$MCP_ARG" >> "$GITHUB_OUTPUT"
          echo "model=$(jq -r .implementer.model scripts/model-config.json)" >> "$GITHUB_OUTPUT"
          echo "effort=$(jq -r .implementer.effort scripts/model-config.json)" >> "$GITHUB_OUTPUT"

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          claude_args: |
            --model ${{ steps.setup.outputs.model }}
            --effort ${{ steps.setup.outputs.effort }}
            --json-schema '{"type":"object","properties":{"status":{"type":"string","enum":["DONE","BLOCKED"]},"branch":{"type":"string"},"summary":{"type":"string"}},"required":["status","summary"]}'
            ${{ steps.setup.outputs.mcp_arg }}
            --allowed-tools "${{ steps.setup.outputs.tools }}"
          prompt: ${{ steps.setup.outputs.prompt }}

      - name: Swap labels
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          status=$(echo "$STRUCTURED_OUTPUT" | jq -r '.status')
          current=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '[.labels[].name] | join(",")')
          REMOVE="--remove-label needs-impl"
          if echo "$current" | grep -q "revised-impl"; then
            REMOVE="$REMOVE --remove-label revised-impl"
          fi
          if [ "$status" = "BLOCKED" ]; then
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              $REMOVE --add-label "needs-human"
          else
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              $REMOVE --add-label "needs-verify"
          fi

      - name: Handle stage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "pipeline-failed"
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "needs-impl" || true
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "implementer stage failed. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
