# Label set for the GHA agent pipeline.
# Create these labels via: gh label create <name> --color <color> --description "<desc>"
# or use gh-label-sync to apply from this file.

- name: needs-plan
  color: "fbca04"
  description: "Planner workflow picks this up"

- name: needs-critique
  color: "e68a00"
  description: "Critic workflow picks this up"

- name: revised-plan
  color: "c0c0c0"
  description: "Critic has sent the plan back for revision"

- name: needs-impl
  color: "0075ca"
  description: "Implementer workflow picks this up"

- name: needs-verify
  color: "7b2d8b"
  description: "Verifier workflow picks this up"

- name: revised-impl
  color: "c0c0c0"
  description: "Verifier has sent the implementation back for revision"

- name: blocked
  color: "d73a4a"
  description: "Agents stop touching this issue"

- name: needs-human
  color: "d73a4a"
  description: "Escape hatch: retries exhausted, ambiguous, or blocked"
