# GitHub Secret Scanning configuration.
#
# Excludes sims/** from secret scanning because the sim packages are
# scripted AWS incident simulations. Their fixtures (artifacts/*.json,
# resolution.md, agent-prompts.md) deliberately contain strings that
# look like AWS keys, Slack webhooks, and other credentials, because
# they are scenario teaching material. None of them have ever been
# real secrets.
#
# See Issue #126 for context. Without this exclusion, every new sim
# triggers false-positive alerts that train the team to ignore the
# security tab.
paths-ignore:
  - "sims/**"
